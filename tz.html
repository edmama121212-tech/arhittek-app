<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ARHITTEK · Техническое задание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#0B1929;
    --bg-soft:#0F2035;
    --card:rgba(255,255,255,0.04);
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.14);
    --text:#FFFFFF;
    --text-dim:rgba(255,255,255,0.5);
    --blue:#4A90E2;
    --blue-soft:rgba(74,144,226,0.15);
    --red:#E05252;
    --green:#52B788;
    --gold:#E8A33D;
    --radius:12px;
    --radius-sm:8px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 60px;
  }
  h1,h2,h3{font-family:'Space Grotesk', 'Inter', sans-serif; letter-spacing:-0.01em;}

  header{
    padding: 24px 18px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(11,25,41,0.95);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .logo{
    width:40px;height:40px; border-radius:var(--radius-sm);
    background: rgba(74,144,226,0.2);
    border: 1px solid rgba(74,144,226,0.4);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:17px;
  }
  .brand-title{font-size:19px; font-weight:700;}
  .brand-sub{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; margin-top:2px;}

  main{padding: 16px 16px 0; max-width:680px; margin:0 auto;}

  .intro{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin-bottom:18px; font-size:13.5px; line-height:1.7; color:var(--text-dim);
  }
  .intro b{color:var(--text);}

  .section{margin-bottom:28px;}
  .section-header{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
    padding-bottom:10px; border-bottom:1px solid var(--line);
  }
  .section-icon{
    width:32px; height:32px; border-radius:var(--radius-sm); background:var(--blue-soft);
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .section-title{font-size:16px; font-weight:700;}
  .section-sub{font-size:11px; color:var(--text-dim); margin-top:2px;}

  /* Progress bar */
  .progress-bar-wrap{
    padding: 12px 16px 0;
    margin-bottom: 4px;
  }
  .progress-bar-labels{
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--text-dim); margin-bottom:6px;
  }
  .progress-bar-labels .pbl-current{color:var(--blue); font-weight:600;}
  .progress-track{height:4px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--blue); border-radius:4px; transition: width .4s ease;}

  .q{margin-bottom:18px;}
  .q-label{font-size:13.5px; font-weight:600; margin-bottom:8px; line-height:1.4;}
  .q-hint{font-size:11px; color:var(--text-dim); margin-top:-4px; margin-bottom:8px; line-height:1.5;}

  input[type="text"], input[type="number"], input[type="tel"], textarea, select{
    width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--line-strong); border-radius:var(--radius-sm);
    color:var(--text); font-size:14px; padding:11px 12px; font-family:'Inter',sans-serif;
  }
  textarea{resize:vertical; min-height:70px;}
  input:focus, textarea:focus, select:focus{outline:none; border-color:rgba(74,144,226,0.6); background:rgba(74,144,226,0.05);}
  input::placeholder, textarea::placeholder{color:rgba(255,255,255,0.3);}

  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  /* Checkbox / chip groups */
  .chip-group{display:flex; flex-wrap:wrap; gap:8px;}
  .chip-option{
    border:1px solid var(--line-strong); border-radius:20px; padding:8px 16px; font-size:13px;
    cursor:pointer; transition: all .15s; color:var(--text-dim); user-select:none;
  }
  .chip-option.checked{background:var(--blue-soft); color:var(--blue); border-color:rgba(74,144,226,0.4);}
  .chip-option input{display:none;}

  /* Toggle / radio rows */
  .toggle-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm);
    margin-bottom:8px; cursor:pointer;
  }
  .toggle-row .lbl{font-size:13px; font-weight:500;}
  .toggle-switch{
    width:42px; height:24px; border-radius:14px; background:rgba(255,255,255,0.1);
    position:relative; transition: background .2s; flex-shrink:0;
  }
  .toggle-switch.on{background:var(--blue);}
  .toggle-switch i{
    position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition: transform .2s;
  }
  .toggle-switch.on i{transform:translateX(18px);}

  /* Reference photo upload */
  .ref-upload{
    border:1px dashed var(--line-strong); border-radius:var(--radius-sm); padding:16px;
    text-align:center; cursor:pointer; color:var(--text-dim); font-size:12.5px; margin-bottom:8px;
  }
  .ref-upload input{display:none;}
  .ref-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;}
  .ref-thumb{position:relative; aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--line);}
  .ref-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .ref-thumb .ref-remove{
    position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%;
    background:rgba(0,0,0,0.6); color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:13px; cursor:pointer; border:none;
  }

  /* Submit */
  .submit-bar{
    position:sticky; bottom:0; background:rgba(11,25,41,0.97); backdrop-filter: blur(12px);
    border-top:1px solid var(--line); padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    margin-top:24px;
  }
  .btn{
    width:100%; border:none; border-radius:var(--radius-sm); font-weight:700; font-size:15px; padding:15px;
    cursor:pointer; font-family:'Space Grotesk',sans-serif; transition: opacity .15s, transform .1s;
  }
  .btn-primary{background:var(--blue); color:#fff;}
  .btn-primary:active{opacity:0.9; transform:scale(0.99);}
  .btn-primary:disabled{opacity:0.5; cursor:not-allowed;}
  .btn-secondary{background:rgba(255,255,255,0.05); color:var(--text); border:1px solid var(--line-strong);}
  .btn-secondary:active{opacity:0.7;}

  /* States */
  .state-screen{
    min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 20px;
  }
  .state-screen .icon{font-size:48px; margin-bottom:16px;}
  .state-screen h2{font-size:20px; margin-bottom:8px;}
  .state-screen p{color:var(--text-dim); font-size:13.5px; line-height:1.6; max-width:380px;}

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--blue); color:#fff; font-size:13px; font-weight:600;
    padding:10px 18px; border-radius:20px; z-index:300;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    font-family:'Space Grotesk',sans-serif; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}
</style>
</head>

// PDF EXPORT
// ============================================================
function tzFieldLabel(fieldId){
  for(const section of SCHEMA){
    for(const field of section.fields){
      if(field.id === fieldId) return field.label;
    }
  }
  return fieldId;
}

function formatAnswerValue(value){
  if(Array.isArray(value)) return value.join(', ');
  if(value === null || value === undefined || value === '') return '—';
  return String(value);
}

function exportTzToPdf(formData){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  registerPdfFonts(doc);

  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 15;
  let y = 20;

  // Logo + header
  const logoSize = 14;
  doc.addImage(ARHITTEK_LOGO_B64, 'PNG', margin, 10, logoSize, logoSize * (87/100));
  const textX = margin + logoSize + 4;
  doc.setFont('Roboto','bold'); doc.setFontSize(18); doc.setTextColor(0);
  doc.text('ARHIT', textX, 19);
  const arhitWidth = doc.getTextWidth('ARHIT');
  doc.setTextColor(69,134,236);
  doc.text('TEK', textX + arhitWidth, 19);
  doc.setTextColor(0);
  doc.setFont('Roboto','normal'); doc.setFontSize(11);
  doc.text('Техническое задание', textX, 26);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(`Дата: ${new Date().toLocaleDateString('ru-RU')}`, pageWidth - margin, 20, {align:'right'});
  doc.setTextColor(0);

  y = 38;
  const selectedServices = Array.isArray(formData.service_type) ? formData.service_type : [];

  SCHEMA.forEach(section=>{
    if(section.requiresService && !selectedServices.includes(section.requiresService)) return;

    const hasAnswers = section.fields.some(f=>{
      const v = formData[f.id];
      return v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && v.length===0);
    });
    if(!hasAnswers && section.id !== 'general') return;

    if(y > 270){ doc.addPage(); y = 20; }

    doc.setFillColor(74,144,226);
    doc.rect(margin, y-4, pageWidth - margin*2, 7, 'F');
    doc.setFont('Roboto','bold'); doc.setFontSize(10); doc.setTextColor(255);
    doc.text(`${section.icon}  ${section.title}`, margin+2, y);
    doc.setTextColor(0);
    y += 8;

    section.fields.forEach(field=>{
      if(field.type === 'refs') return;
      const value = formData[field.id];
      if(value === undefined || value === null || value === '' || (Array.isArray(value) && value.length===0)) return;

      if(y > 275){ doc.addPage(); y = 20; }

      doc.setFont('Roboto','bold'); doc.setFontSize(9);
      const labelLines = doc.splitTextToSize(field.label, pageWidth - margin*2);
      labelLines.forEach(line=>{ doc.text(line, margin, y); y += 4.5; });

      doc.setFont('Roboto','normal'); doc.setFontSize(9); doc.setTextColor(60);
      const valueText = formatAnswerValue(value);
      const valueLines = doc.splitTextToSize(valueText, pageWidth - margin*2);
      valueLines.forEach(line=>{
        if(y > 280){ doc.addPage(); y = 20; }
        doc.text(line, margin, y); y += 4.5;
      });
      doc.setTextColor(0);
      y += 2;
    });

    y += 3;
  });

  if(y > 270){ doc.addPage(); y = 20; }
  y = Math.max(y, 270);
  doc.setFont('Roboto','normal'); doc.setFontSize(8); doc.setTextColor(140);
  doc.text('ARHITTEK — архитектурное проектирование, дизайн интерьера, ремонт под ключ', margin, y);
  doc.text('г. Грозный, проспект Ахмеда Хаджи Кадырова 40, бизнес-парк «Гранд», 3 этаж', margin, y+4);

  const clientName = formData.full_name || 'klient';
  const fileName = `TZ-${clientName.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_')}-${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fileName);
}

// STATE
// ============================================================
let token = null;
let tzForm = null;
let answers = {};
// refs are now stored as URLs in answers[fieldId+'_files']

function getToken(){
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

// ============================================================
// LOAD FORM
// ============================================================
async function init(){
  token = getToken();
  if(!token){
    renderError('Ссылка недействительна', 'В ссылке отсутствует код доступа. Пожалуйста, уточните корректную ссылку у ARHITTEK.');
    return;
  }

  try{
    const {data, error} = await sb.rpc('get_tz_form_by_token', {p_token: token});
    const row = Array.isArray(data) ? data[0] : data;
    if(error || !row){
      renderError('Форма не найдена', 'Возможно, ссылка устарела или была изменена. Пожалуйста, уточните корректную ссылку у ARHITTEK.');
      return;
    }
    tzForm = row;
    answers = tzForm.answers || {};
    renderForm();
  }catch(e){
    console.error(e);
    renderError('Ошибка загрузки', 'Не удалось загрузить форму. Проверьте подключение к интернету и попробуйте снова.');
  }
}

function renderError(title, text){
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="icon">⚠️</div>
      <h2>${escapeHtml(title)}</h2>
      <p>${escapeHtml(text)}</p>
    </div>`;
}


// ============================================================
// RENDER FORM
// ============================================================
function renderForm(){
  const app = document.getElementById('app');

  const selectedServices = Array.isArray(answers.service_type) ? answers.service_type : [];

  // Build visible sections list
  const visibleSections = SCHEMA.filter(s=>
    !s.requiresService || selectedServices.includes(s.requiresService)
  );
  const total = visibleSections.length;

  // Count filled sections
  const filledCount = visibleSections.filter(s=>{
    return s.fields.some(f=>{
      const v = answers[f.id];
      return v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && v.length===0);
    });
  }).length;

  const pct = total > 0 ? Math.round((filledCount / total) * 100) : 0;

  let html = `<div class="progress-bar-wrap">
    <div class="progress-bar-labels">
      <span>Заполнено разделов: <span class="pbl-current">${filledCount} из ${total}</span></span>
      <span>${pct}%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="intro" style="margin-top:10px;">
    Заполните анкету как можно подробнее — это поможет нам быстрее и точнее подготовить проект для вас.
    Сначала укажите, какая услуга вам нужна — соответствующие разделы появятся ниже.
  </div>`;

  visibleSections.forEach((section, idx)=>{
    html += `<div class="section" data-section="${section.id}">
      <div class="section-header">
        <div class="section-icon">${section.icon}</div>
        <div>
          <div class="section-title">${escapeHtml(section.title)} <span style="font-size:11px; color:var(--text-dim); font-weight:400;">${idx+1}/${total}</span></div>
          <div class="section-sub">${escapeHtml(section.sub)}</div>
        </div>
      </div>`;

    section.fields.forEach(field=>{
      html += renderField(field);
    });

    html += `</div>`;
  });

  html += `<div class="submit-bar">
    <div id="saveStatus" style="font-size:12px; color:var(--text-dim); text-align:center;">
      Изменения сохраняются автоматически
    </div>
  </div>`;

  app.innerHTML = html;

  // Bind events
  bindFieldEvents();
  restorePendingRefPreviews();
}

function renderField(field){
  const val = answers[field.id];

  if(field.type === 'text' || field.type === 'tel' || field.type === 'number'){
    return `<div class="q">
      <div class="q-label">${escapeHtml(field.label)}</div>
      ${field.hint?`<div class="q-hint">${escapeHtml(field.hint)}</div>`:''}
      <input type="${field.type}" data-field="${field.id}" placeholder="${escapeHtml(field.placeholder||'')}" value="${escapeHtml(val||'')}">
    </div>`;
  }

  if(field.type === 'textarea'){
    return `<div class="q">
      <div class="q-label">${escapeHtml(field.label)}</div>
      ${field.hint?`<div class="q-hint">${escapeHtml(field.hint)}</div>`:''}
      <textarea data-field="${field.id}" placeholder="${escapeHtml(field.placeholder||'')}">${escapeHtml(val||'')}</textarea>
    </div>`;
  }

  if(field.type === 'chips'){
    const selected = Array.isArray(val) ? val : (val ? [val] : []);
    const optionsHtml = field.options.map(opt=>{
      const checked = selected.includes(opt);
      return `<label class="chip-option ${checked?'checked':''}" data-field="${field.id}" data-value="${escapeHtml(opt)}" data-multi="${!!field.multi}">
        <input type="${field.multi?'checkbox':'radio'}" ${checked?'checked':''}>
        ${escapeHtml(opt)}
      </label>`;
    }).join('');
    return `<div class="q">
      <div class="q-label">${escapeHtml(field.label)}</div>
      ${field.hint?`<div class="q-hint">${escapeHtml(field.hint)}</div>`:''}
      <div class="chip-group">${optionsHtml}</div>
    </div>`;
  }

  if(field.type === 'refs'){
    const existingRefs = (answers[field.id+'_files'] || []);
    return `<div class="q">
      <div class="q-label">${escapeHtml(field.label)}</div>
      ${field.hint?`<div class="q-hint">${escapeHtml(field.hint)}</div>`:''}
      <div class="ref-grid" id="refgrid-${field.id}">
        ${existingRefs.map((url,i)=>`
          <div class="ref-thumb"><img src="${escapeHtml(url)}"><button class="ref-remove" data-field="${field.id}" data-idx="${i}" data-existing="1">✕</button></div>
        `).join('')}
      </div>
      <label class="ref-upload" for="reffile-${field.id}">📷 Добавить фото-референсы</label>
      <input type="file" id="reffile-${field.id}" data-field="${field.id}" accept="image/*" multiple>
    </div>`;
  }

  return '';
}

// ============================================================
// EVENT BINDING & ANSWER COLLECTION
// ============================================================
function addRefThumbFromUrl(fieldId, url, idx){
  const grid = document.getElementById(`refgrid-${fieldId}`);
  if(!grid) return;
  const div = document.createElement('div');
  div.className = 'ref-thumb';
  div.innerHTML = `<img src="${escapeHtml(url)}"><button class="ref-remove" data-field="${escapeHtml(fieldId)}" data-idx="${idx}" data-existing="1">✕</button>`;
  div.querySelector('.ref-remove').addEventListener('click', ()=>{
    const key = fieldId+'_files';
    if(answers[key]) answers[key].splice(idx,1);
    div.remove();
    scheduleAutoSave();
    // Re-index remaining thumbs
    const remaining = grid.querySelectorAll('.ref-remove[data-existing]');
    remaining.forEach((btn,i)=>{ btn.dataset.idx = i; });
  });
  grid.appendChild(div);
}

async function uploadRefFile(fieldId, file){
  const grid = document.getElementById(`refgrid-${fieldId}`);
  // Show loading placeholder
  const placeholder = document.createElement('div');
  placeholder.className = 'ref-thumb';
  placeholder.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:var(--text-dim);">⏳</div>`;
  if(grid) grid.appendChild(placeholder);

  try{
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `tz-refs/${tzForm.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from('tz-references').upload(path, file, { upsert: false });
    if(error) throw error;
    const { data: urlData } = sb.storage.from('tz-references').getPublicUrl(path);
    const url = urlData.publicUrl;
    const key = fieldId+'_files';
    if(!answers[key]) answers[key] = [];
    answers[key].push(url);
    if(grid) placeholder.remove();
    addRefThumbFromUrl(fieldId, url, answers[key].length - 1);
    scheduleAutoSave();
  }catch(e){
    console.error('upload error', e);
    if(grid) placeholder.remove();
    showToast('Ошибка загрузки фото');
  }
}

function restorePendingRefPreviews(){
  // No pending files across sessions — refs are now stored as URLs
}

function bindFieldEvents(){
  // Text inputs / textareas
  document.querySelectorAll('input[data-field], textarea[data-field]').forEach(el=>{
    if(el.type === 'file') return;
    el.addEventListener('input', ()=>{
      answers[el.dataset.field] = el.value;
      scheduleAutoSave();
    });
  });

  // Chips
  document.querySelectorAll('.chip-option').forEach(chip=>{
    chip.addEventListener('click', (e)=>{
      e.preventDefault();
      const fieldId = chip.dataset.field;
      const value = chip.dataset.value;
      const multi = chip.dataset.multi === 'true';

      if(multi){
        let arr = Array.isArray(answers[fieldId]) ? answers[fieldId].slice() : [];
        if(arr.includes(value)) arr = arr.filter(v=>v!==value);
        else arr.push(value);
        answers[fieldId] = arr;
      }else{
        answers[fieldId] = value;
        // Uncheck siblings
        document.querySelectorAll(`.chip-option[data-field="${fieldId}"]`).forEach(c=>{
          c.classList.remove('checked');
          c.querySelector('input').checked = false;
        });
      }

      chip.classList.toggle('checked');
      chip.querySelector('input').checked = chip.classList.contains('checked');

      scheduleAutoSave();

      // If the service type selection changed, re-render to show/hide AR/DI sections
      if(fieldId === 'service_type'){
        renderForm();
      }
    });
  });

  // Reference file inputs — upload to Supabase Storage immediately
  document.querySelectorAll('input[type="file"][data-field]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      const fieldId = input.dataset.field;
      const files = Array.from(e.target.files || []);
      files.forEach(file=> uploadRefFile(fieldId, file));
      input.value = '';
    });
  });

  // Remove existing refs — handled inside addRefThumbFromUrl
}

// ============================================================
// SUBMIT
// ============================================================

// Update progress bar without full re-render
function updateProgressBar(){
  const selectedServices = Array.isArray(answers.service_type) ? answers.service_type : [];
  const visibleSections = SCHEMA.filter(s=> !s.requiresService || selectedServices.includes(s.requiresService));
  const total = visibleSections.length;
  const filledCount = visibleSections.filter(s=>{
    return s.fields.some(f=>{
      const v = answers[f.id];
      return v !== undefined && v !== null && v !== '' && !(Array.isArray(v) && v.length===0);
    });
  }).length;
  const pct = total > 0 ? Math.round((filledCount / total) * 100) : 0;
  const fill = document.querySelector('.progress-fill');
  const labels = document.querySelector('.progress-bar-labels');
  if(fill) fill.style.width = pct + '%';
  if(labels) labels.querySelector('.pbl-current').textContent = filledCount + ' из ' + total;
  const pctEl = labels ? labels.querySelectorAll('span')[1] : null;
  if(pctEl) pctEl.textContent = pct + '%';
}

// Autosave — triggers on every field change + every 30s
let saveInFlight = false;
let saveTimer = null;

async function autoSave(){
  if(!tzForm) return;
  if(saveInFlight) return;
  saveInFlight = true;
  const status = document.getElementById('saveStatus');
  if(status) status.textContent = 'Сохранение…';
  try{
    const {error} = await sb.rpc('submit_tz_form', {
      p_token: token,
      p_answers: answers,
      p_client_name: answers.full_name || tzForm?.client_name || '',
    });
    if(error) throw error;
    if(status) status.textContent = 'Сохранено · ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    updateProgressBar();
  }catch(e){
    console.error('autosave error', e);
    if(status) status.textContent = 'Ошибка сохранения';
  }finally{
    saveInFlight = false;
  }
}

function scheduleAutoSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 1500);
}

setInterval(autoSave, 30000);

init();
</script>
