<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог проектов — ARHITTEK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--blue:#3D8FE0;--blue-dark:#2A72C0;--blue-light:#E8F3FC;--black:#0A0A0A;--border:#D0D0D0;--border-soft:#DCDCDC;--text-primary:#1A1A1A;--text-sub:#888;--text-label:#BBB;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#C8C8C8;min-height:100vh;}

  /* HEADER */
  .cat-header{
    background:#0A0A0A; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .cat-logo{font-weight:700;color:#fff;font-size:16px;letter-spacing:.05em;}
  .cat-logo span{color:#3D8FE0;}
  .cat-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;}

  /* FILTERS */
  .cat-filters{
    padding:14px 16px 10px;
    display:flex; gap:8px; overflow-x:auto;
    background:#D4D4D4;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .cat-filters::-webkit-scrollbar{display:none;}
  .filter-chip{
    flex-shrink:0; font-size:12px; padding:7px 16px; border-radius:20px;
    border:1px solid #BEBEBE; color:#666; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:all .15s;
    background:#D4D4D4;
  }
  .filter-chip.active{background:#3D8FE0;color:#fff;border-color:#3D8FE0;}

  /* SCROLL FEED */
  .cat-feed{
    padding:12px 16px 40px;
    display:flex; flex-direction:column; align-items:center; gap:20px;
  }

  /* CARD */
  .card{
    background:#F2F2F2; border-radius:20px; width:100%; max-width:390px;
    box-shadow:0 8px 32px rgba(0,0,0,.12); overflow:hidden;
  }
  .card-header{background:var(--black);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
  .header-badge{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);}
  .tabs{display:flex;background:#F2F2F2;border-bottom:2px solid var(--border);}
  .tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;user-select:none;}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
  .panel{display:none;}.panel.active{display:block;}

  /* SWIPER */
  .swiper-wrap{position:relative;overflow:hidden;background:#000;cursor:grab;transition:height .25s ease;}
  .swiper-track{display:flex;height:100%;transition:transform .35s cubic-bezier(.4,0,.2,1);}
  .swiper-slide{min-width:100%;height:100%;position:relative;flex-shrink:0;}
  .swiper-slide img{width:100%;height:auto;display:block;opacity:.93;}
  .swiper-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.38) 0%,transparent 55%);pointer-events:none;}
  .swiper-caption{position:absolute;bottom:11px;left:13px;font-size:11px;font-weight:600;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.4);pointer-events:none;}
  .swiper-num{position:absolute;top:11px;right:13px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;pointer-events:none;}
  .swiper-dots{position:absolute;bottom:11px;right:13px;display:flex;gap:5px;pointer-events:none;}
  .swiper-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);transition:all .2s;}
  .swiper-dot.active{background:#fff;width:14px;border-radius:3px;}

  /* PLAN */
  .plan-wrap{padding:12px 12px 8px;background:#E8E8E8;}
  .plan-label{font-size:9px;font-weight:700;color:var(--text-label);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
  .plan-label span{background:var(--blue-light);color:var(--blue);font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .plan-img-container{background:#E8EDF4;border:1px solid var(--border);border-radius:10px;padding:10px;}
  .plan-img{width:100%;height:auto;display:block;border-radius:4px;}

  /* EXPL */
  .explication{margin:8px 12px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .expl-header{background:var(--blue);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
  .expl-header-title{font-size:9px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.08em;text-transform:uppercase;}
  .expl-header-total{font-size:12px;font-weight:700;color:#fff;}
  .expl-row{display:flex;align-items:center;padding:6px 12px;border-top:1px solid var(--border-soft);}
  .expl-row:nth-child(even){background:#EBEBEB;}
  .expl-num{width:18px;height:18px;background:var(--blue-light);color:var(--blue);border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;}
  .expl-name{flex:1;font-size:12px;color:var(--text-primary);}
  .expl-area{font-size:12px;font-weight:600;color:var(--text-primary);}
  .expl-area sup{font-size:8px;font-weight:400;color:var(--text-sub);}

  /* INFO */
  .info-block{padding:14px 12px 0;}
  .project-title{font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:10px;line-height:1.3;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
  .stat{background:#E2E2E2;border-radius:9px;padding:9px 5px;text-align:center;border:1px solid var(--border);}
  .stat-val{font-size:15px;font-weight:700;color:var(--text-primary);line-height:1;}
  .stat-sub{font-size:8px;color:var(--text-label);margin-top:2px;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
  .tag{background:var(--blue-light);border:1px solid #C8DFF5;border-radius:20px;padding:4px 10px;font-size:11px;color:var(--blue-dark);font-weight:500;}
  .divider{height:1px;background:var(--border);margin:0 0 12px;}
  .section-label-sm{font-size:9px;font-weight:700;color:var(--text-label);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;}
  .includes-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
  .include-cell{background:#E2E2E2;border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;align-items:flex-start;gap:6px;}
  .include-icon{font-size:14px;flex-shrink:0;}
  .include-text{font-size:11px;color:var(--text-primary);line-height:1.3;}

  /* PRICE */
  .price-block{margin:0 12px;padding:12px 0;border-top:1px solid var(--border);}
  .price-label{font-size:10px;color:var(--text-label);margin-bottom:2px;}
  .price{font-size:26px;font-weight:700;color:var(--text-primary);line-height:1;margin-bottom:10px;}
  .btn-row{display:flex;gap:7px;}
  .btn-primary{flex:1;background:var(--blue);color:#fff;border:none;border-radius:11px;padding:13px 6px;font-size:13px;font-weight:700;cursor:pointer;}
  .btn-secondary{flex:1;background:#F2F2F2;color:var(--text-primary);border:1.5px solid var(--border);border-radius:11px;padding:12px 6px;font-size:13px;font-weight:500;cursor:pointer;}
  .card-footer{background:var(--black);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .footer-text{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;}

  /* LOADING / ERROR */
  .state-msg{text-align:center;padding:60px 24px;color:#888;font-size:14px;}
  .state-msg .big{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="cat-header">
  <div>
    <div class="cat-logo">ARHI<span>TTEK</span></div>
    <div class="cat-sub">Каталог проектов</div>
  </div>
</div>

<div class="cat-filters" id="catFilters">
  <div class="filter-chip active" onclick="setFilter('all',this)">Все</div>
  <div class="filter-chip" onclick="setFilter('1',this)">1-этажные</div>
  <div class="filter-chip" onclick="setFilter('2',this)">2-этажные</div>
  <div class="filter-chip" onclick="setFilter('3',this)">3+ этажа</div>
</div>

<div class="cat-feed" id="catFeed">
  <div class="state-msg"><div class="big">⏳</div>Загружаем каталог…</div>
</div>

<script>
const SUPABASE_URL = 'https://chbkkoxwzpaghanofvqk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fOLaPnbXjzQnJwG__wVzzg_D0nMO-n0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const token = new URLSearchParams(location.search).get('t');
let allCards = [];
let floorFilter = 'all';
let linkMeta = null;

function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function init(){
  const feed = document.getElementById('catFeed');

  if(!token){
    feed.innerHTML = '<div class="state-msg"><div class="big">🔗</div>Неверная ссылка.<br>Обратитесь к менеджеру ARHITTEK.</div>';
    return;
  }

  // Проверить токен
  try{
    const { data: linkData, error: linkErr } = await sb.from('share_links')
      .select('*').eq('token', token).is('deleted_at', null).single();
    if(linkErr || !linkData){
      feed.innerHTML = '<div class="state-msg"><div class="big">🚫</div>Эта ссылка недействительна.<br>Обратитесь к менеджеру ARHITTEK.</div>';
      return;
    }

    // Проверить срок действия
    if(linkData.expires_at && new Date(linkData.expires_at).getTime() < Date.now()){
      feed.innerHTML = '<div class="state-msg"><div class="big">⏰</div>Срок действия этой ссылки истёк.<br>Обратитесь к менеджеру ARHITTEK для получения новой ссылки.</div>';
      return;
    }

    linkMeta = linkData;

    // Скрыть фильтры если ссылка с фиксированным фильтром
    if(linkMeta.floors_filter && linkMeta.floors_filter !== 'all'){
      floorFilter = linkMeta.floors_filter;
      document.getElementById('catFilters').style.display = 'none';
    }
  } catch(e){
    feed.innerHTML = '<div class="state-msg"><div class="big">⚠️</div>Ошибка загрузки.<br>Попробуйте позже.</div>';
    return;
  }

  // Загрузить карточки
  try{
    let query = sb.from('project_cards').select('*').is('deleted_at', null).order('created_at', { ascending: false });
    const { data, error } = await query;
    if(error) throw error;
    allCards = data || [];
    renderFeed();
  } catch(e){
    feed.innerHTML = '<div class="state-msg"><div class="big">⚠️</div>Ошибка загрузки карточек.</div>';
  }
}

function setFilter(val, el){
  floorFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  if(el) el.classList.add('active');
  renderFeed();
}

function renderFeed(){
  const feed = document.getElementById('catFeed');
  let cards = allCards;

  // Применить фильтр ссылки
  const linkFloor = linkMeta?.floors_filter || 'all';
  if(linkFloor !== 'all'){
    cards = cards.filter(c=>String(c.floors)===String(linkFloor));
  }
  // Применить пользовательский фильтр
  if(floorFilter !== 'all'){
    cards = cards.filter(c=>String(c.floors)===String(floorFilter));
  }

  if(!cards.length){
    feed.innerHTML = '<div class="state-msg"><div class="big">🏠</div>Нет карточек для этого фильтра.</div>';
    return;
  }

  feed.innerHTML = cards.map((card,cardIdx)=>buildCardHTML(card, cardIdx)).join('');

  // Инициализировать свайперы
  cards.forEach((card,i)=>initSwiper('swiper-'+i));
}

function buildCardHTML(card, idx){
  const images = card.images || [];
  const facade1 = images[0]||'';
  const facade2 = images[1]||'';
  const plan1   = images[2]||'';
  const plan2   = images[3]||'';
  const tags = (card.tags||[]).map(t=>`<div class="tag">${escapeHtml(t)}</div>`).join('');
  const e1 = (card.expl1||[]).map((r,i)=>`<div class="expl-row"><div class="expl-num">${i+1}</div><div class="expl-name">${escapeHtml(r.name)}</div><div class="expl-area">${escapeHtml(r.area)}<sup> м²</sup></div></div>`).join('');
  const e2 = (card.expl2||[]).map((r,i)=>`<div class="expl-row"><div class="expl-num">${i+1}</div><div class="expl-name">${escapeHtml(r.name)}</div><div class="expl-area">${escapeHtml(r.area)}<sup> м²</sup></div></div>`).join('');
  const has2 = (card.floors||1)>=2;
  const tab2 = has2 ? `<div class="tab" onclick="showTab_${idx}('floor2_${idx}',this)">2-й этаж</div>` : '';
  const panel2 = has2 ? `
    <div class="panel" id="floor2_${idx}">
      <div class="plan-wrap">
        <div class="plan-label">2-й этаж <span>${escapeHtml(card.floor2_area||'')} м²</span></div>
        <div class="plan-img-container">${plan2?`<img class="plan-img" src="${plan2}"/>`:'<div style="height:60px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:12px;">Нет изображения</div>'}</div>
      </div>
      <div class="explication"><div class="expl-header"><span class="expl-header-title">Экспликация</span><span class="expl-header-total">${escapeHtml(card.floor2_area||'')} м²</span></div>${e2}</div>
      <div style="height:12px;"></div>
    </div>` : '';

  return `<div class="card">
  <div class="card-header">
    <div style="font-weight:700;color:#fff;font-size:14px;letter-spacing:.05em;">ARHI<span style="color:#3D8FE0;">TTEK</span></div>
    <span class="header-badge">${card.floors===1?'1 этаж':card.floors===2?'2 этажа':card.floors+'+ эт.'}</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab_${idx}('facade_${idx}',this)">Фасад</div>
    <div class="tab" onclick="showTab_${idx}('floor1_${idx}',this)">1-й этаж</div>
    ${tab2}
  </div>
  <div class="panel active" id="facade_${idx}">
    <div class="swiper-wrap" id="swiper-${idx}">
      <div class="swiper-track" id="track-${idx}">
        <div class="swiper-slide">${facade1?`<img src="${facade1}"/>`:'<div style="width:100%;height:100%;background:#333;display:flex;align-items:center;justify-content:center;font-size:40px;">🏠</div>'}<div class="swiper-overlay"></div></div>
        ${facade2?`<div class="swiper-slide"><img src="${facade2}"/><div class="swiper-overlay"></div></div>`:''}
      </div>
      <div class="swiper-caption">${escapeHtml(card.title||'')}</div>
      <div class="swiper-num">№ ${escapeHtml(card.project_number||'')}</div>
      ${facade2?`<div class="swiper-dots"><div class="swiper-dot active" id="dot-${idx}-0"></div><div class="swiper-dot" id="dot-${idx}-1"></div></div>`:''}
    </div>
  </div>
  <div class="panel" id="floor1_${idx}">
    <div class="plan-wrap">
      <div class="plan-label">1-й этаж <span>${escapeHtml(card.floor1_area||'')} м²</span></div>
      <div class="plan-img-container">${plan1?`<img class="plan-img" src="${plan1}"/>`:'<div style="height:60px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:12px;">Нет изображения</div>'}</div>
    </div>
    <div class="explication"><div class="expl-header"><span class="expl-header-title">Экспликация</span><span class="expl-header-total">${escapeHtml(card.floor1_area||'')} м²</span></div>${e1}</div>
    <div style="height:12px;"></div>
  </div>
  ${panel2}
  <div class="info-block">
    <div class="project-title">${escapeHtml(card.title||'')}</div>
    <div class="stats">
      <div class="stat"><div class="stat-val">${escapeHtml(String(card.total_area||'—'))}</div><div class="stat-sub">м² общая</div></div>
      <div class="stat"><div class="stat-val">${escapeHtml(String(card.beds||'—'))}</div><div class="stat-sub">спальни</div></div>
      <div class="stat"><div class="stat-val">${escapeHtml(String(card.floors||'—'))}</div><div class="stat-sub">этажа</div></div>
      <div class="stat"><div class="stat-val" style="font-size:11px">${escapeHtml(card.footprint||'—')}</div><div class="stat-sub">габарит</div></div>
    </div>
    <div class="tags">${tags}</div>
    <div class="divider"></div>
    <div class="section-label-sm">Что входит и гарантии</div>
    <div class="includes-grid">
      <div class="include-cell"><div class="include-icon">📐</div><div class="include-text">Архитектурные решения (АР)</div></div>
      <div class="include-cell"><div class="include-icon">🎨</div><div class="include-text">3D-визуализация всех фасадов</div></div>
      <div class="include-cell"><div class="include-icon">✅</div><div class="include-text">Адаптация под ваш участок</div></div>
      <div class="include-cell"><div class="include-icon">✏️</div><div class="include-text">До 3 правок — включены</div></div>
    </div>
  </div>
  <div class="price-block">
    <div class="price-label">Стоимость проекта</div>
    <div class="price">${escapeHtml(card.price||'')} ₽</div>
    <div class="btn-row">
      <button class="btn-primary" onclick="wa()">Получить проект</button>
      <button class="btn-secondary" onclick="wa()">Консультация</button>
    </div>
  </div>
  <div class="card-footer">
    <div style="font-weight:700;color:#fff;font-size:12px;letter-spacing:.05em;">ARHI<span style="color:#3D8FE0;">TTEK</span></div>
    <span class="footer-text">arhittek.ru · Грозный</span>
  </div>
</div>`;
}

// Per-card tab switching (each card is independent)
function makeShowTab(idx){
  return function(id, el){
    const card = el.closest('.card');
    card.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    card.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  };
}

// Generate showTab_N functions dynamically after render
function initSwiper(wrId){
  const wrap = document.getElementById(wrId);
  if(!wrap) return;
  const idx = wrId.split('-')[1];
  const track = document.getElementById('track-'+idx);
  const slides = track ? track.querySelectorAll('.swiper-slide') : [];
  if(!track || !slides.length) return;
  let si = 0;

  // Подгоняем высоту окна под пропорции текущего изображения (ширина = 100% карточки)
  function sizeToSlide(i){
    const img = slides[i] ? slides[i].querySelector('img') : null;
    if(!img){ wrap.style.height = '200px'; return; }
    const applyH=()=>{
      if(img.naturalWidth && img.naturalHeight){
        const w = wrap.clientWidth || wrap.offsetWidth;
        wrap.style.height = (w * (img.naturalHeight/img.naturalWidth)) + 'px';
      }
    };
    if(img.complete && img.naturalWidth) applyH();
    else img.addEventListener('load', applyH, {once:true});
  }
  sizeToSlide(0);

  if(slides.length < 2) return;
  function goTo(i){
    si = Math.max(0, Math.min(slides.length-1, i));
    track.style.transform = 'translateX('+(-si*100)+'%)';
    [0,1].forEach(j=>{
      const d = document.getElementById('dot-'+idx+'-'+j);
      if(d) d.className = 'swiper-dot'+(j===si?' active':'');
    });
    sizeToSlide(si);
  }
  let sx = 0;
  wrap.addEventListener('mousedown', e=>{ sx=e.clientX; });
  wrap.addEventListener('mouseup', e=>{ if(Math.abs(sx-e.clientX)>40) goTo(sx>e.clientX?si+1:si-1); });
  wrap.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; }, {passive:true});
  wrap.addEventListener('touchend', e=>{ if(Math.abs(sx-e.changedTouches[0].clientX)>40) goTo(sx>e.changedTouches[0].clientX?si+1:si-1); });
}

// Global per-card showTab — called by onclick="showTab_N(..."
// We create them dynamically
const _origRenderFeed = renderFeed;
window.renderFeed = function(){
  _origRenderFeed();
  // after render, create per-card showTab functions
  allCards.forEach((card,i)=>{
    window['showTab_'+i] = makeShowTab(i);
  });
};

function wa(){ window.open('https://wa.me/79226593872','_blank'); }

init();
</script>
